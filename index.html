<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Claude Usage HUD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  .card {
    width: 300px;
    height: 150px;
    background: rgba(18, 18, 20, 0.98);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-app-region: drag;
  }

  .header .brand {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.55);
  }

  .block { display: flex; flex-direction: column; gap: 5px; }

  .block-label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .block-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.55);
  }

  .block-pct {
    font-size: 20px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: rgba(255, 255, 255, 0.92);
  }

  .block-pct.dim { color: rgba(255, 255, 255, 0.3); font-size: 14px; }

  .bar-track {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.10);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 300ms ease, background-color 300ms ease;
    background: rgba(255, 255, 255, 0.15);
  }

  .sub-label {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.35);
  }

  .footer {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
  }

  .dot.live { background: #4ADE80; }

  .footer-text {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    line-height: 1.5;
    padding: 0 8px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="brand">Claude Max</div>
    </div>

    <div id="empty-state" class="empty-state hidden"></div>

    <div id="quota-blocks">
      <div class="block">
        <div class="block-label-row">
          <div class="block-label">SESSION (5H)</div>
          <div class="block-pct" id="session-pct">--</div>
        </div>
        <div class="bar-track"><div class="bar-fill" id="session-bar"></div></div>
        <div class="sub-label" id="session-sub">&nbsp;</div>
      </div>

      <div class="block">
        <div class="block-label-row">
          <div class="block-label">WEEKLY (7D)</div>
          <div class="block-pct" id="weekly-pct">--</div>
        </div>
        <div class="bar-track"><div class="bar-fill" id="weekly-bar"></div></div>
        <div class="sub-label" id="weekly-sub">&nbsp;</div>
      </div>
    </div>

    <div class="footer">
      <div class="dot" id="status-dot"></div>
      <div class="footer-text" id="status-text">waiting for data...</div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
